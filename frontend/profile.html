<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillBridge — Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-wrap { max-width: 600px; margin: 0 auto; }

    .profile-header-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--cyan-glow);
      border: 2px solid rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--cyan);
      flex-shrink: 0;
    }
    .profile-info h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .profile-info p { font-size: 0.875rem; color: var(--muted); }
    .profile-info .joined {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .edit-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .edit-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .form-stack { display: flex; flex-direction: column; gap: 1rem; }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .danger-card {
      background: rgba(255,92,92,0.04);
      border: 1px solid rgba(255,92,92,0.2);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .danger-text h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.2rem; }
    .danger-text p  { font-size: 0.8rem; color: var(--muted); }
    .btn-danger {
      background: rgba(255,92,92,0.1);
      color: var(--red);
      border: 1px solid rgba(255,92,92,0.3);
      border-radius: 8px;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(255,92,92,0.2); }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Skill<span>Bridge</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="analyzer.html">Analyzer</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="roadmap.html">Roadmap</a></li>
    <li><a href="profile.html" class="active">Profile</a></li>
  </ul>
</nav>

<div class="container page">
  <div class="profile-wrap">

    <div class="page-header">
      <h1>My Profile</h1>
      <p>Manage your account details.</p>
    </div>

    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading profile...</p>
    </div>

    <div id="content" style="display:none;">

      <!-- Profile header -->
      <div class="profile-header-card">
        <div class="avatar" id="avatar-initials">?</div>
        <div class="profile-info">
          <h2 id="profile-name">—</h2>
          <p id="profile-email">—</p>
          <p class="joined" id="profile-joined">—</p>
        </div>
      </div>

      <!-- Edit form -->
      <div class="edit-card">
        <h2>Edit Profile</h2>
        <div class="form-stack">
          <div class="alert" id="update-alert"></div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="edit-name" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="edit-email" disabled style="opacity:0.5;cursor:not-allowed;">
          </div>
          <div class="form-group">
            <label>Bio <span style="font-size:0.75rem;color:var(--muted);text-transform:none;letter-spacing:0;">(optional)</span></label>
            <textarea id="edit-bio" placeholder="Tell us about yourself — your goals, background, what you're learning..."></textarea>
          </div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="saveProfile()" id="save-btn">Save Changes</button>
            <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Danger zone -->
      <div class="danger-card">
        <div class="danger-text">
          <h3>Sign Out</h3>
          <p>This will clear your session from this device.</p>
        </div>
        <button class="btn-danger" onclick="logout()">Sign Out</button>
      </div>

    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (!requireLogin()) {}

  let originalName = '';
  let originalBio  = '';

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function formatJoined(str) {
    if (!str) return '';
    return 'Joined ' + new Date(str).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
  }

  function showAlert(msg, type='success') {
    const el = document.getElementById('update-alert');
    el.textContent = msg;
    el.className   = `alert alert-${type} show`;
    setTimeout(() => el.className = 'alert', 3000);
  }

  async function load() {
    const loading = document.getElementById('loading');
    const content = document.getElementById('content');

    try {
      const user = await ProfileAPI.get();
      if (user.detail) throw new Error(user.detail);

      originalName = user.name  || '';
      originalBio  = user.bio   || '';

      document.getElementById('avatar-initials').textContent = getInitials(user.name || '?');
      document.getElementById('profile-name').textContent    = user.name  || '—';
      document.getElementById('profile-email').textContent   = user.email || '—';
      document.getElementById('profile-joined').textContent  = formatJoined(user.created_at);

      document.getElementById('edit-name').value  = user.name  || '';
      document.getElementById('edit-email').value = user.email || '';
      document.getElementById('edit-bio').value   = user.bio   || '';

      loading.style.display = 'none';
      content.style.display = 'block';
    } catch(e) {
      loading.innerHTML = `<p style="color:var(--red);">Could not load profile: ${e.message}</p>`;
    }
  }

  async function saveProfile() {
    const name = document.getElementById('edit-name').value.trim();
    const bio  = document.getElementById('edit-bio').value.trim();
    const btn  = document.getElementById('save-btn');

    if (!name) return showAlert('Name cannot be empty.', 'error');

    btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
    btn.disabled  = true;

    const result = await ProfileAPI.update(name, bio);
    if (result.message) {
      // Update displayed name and avatar
      document.getElementById('profile-name').textContent    = name;
      document.getElementById('avatar-initials').textContent = getInitials(name);
      localStorage.setItem('name', name);
      showAlert('Profile updated successfully!', 'success');
      originalName = name;
      originalBio  = bio;
    } else {
      showAlert(result.detail || 'Update failed.', 'error');
    }

    btn.innerHTML = 'Save Changes';
    btn.disabled  = false;
  }

  function cancelEdit() {
    document.getElementById('edit-name').value = originalName;
    document.getElementById('edit-bio').value  = originalBio;
  }

  load();
</script>
</body>
</html>
