<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillBridge — Sign In</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      background: var(--bg);
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .auth-logo h1 span { color: var(--cyan); }
    .auth-logo p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 1rem;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--cyan);
      background: var(--bg3);
      border-bottom: 2px solid var(--cyan);
    }

    .tab-content { padding: 1.75rem; }

    .form-stack { display: flex; flex-direction: column; gap: 1rem; }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .auth-footer a { color: var(--cyan); }
  </style>
</head>
<body>

<div class="auth-wrap">

  <div class="auth-logo">
    <h1>Skill<span>Bridge</span></h1>
    <p>AI-powered skill gap analysis</p>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-content" id="tab-login">
      <div class="form-stack">
        <div class="alert" id="login-error"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()" id="login-btn">
          Sign In
        </button>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="tab-content" id="tab-register" style="display:none;">
      <div class="form-stack">
        <div class="alert" id="reg-error"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Create a password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doRegister()" id="reg-btn">
          Create Account
        </button>
      </div>
    </div>
  </div>

  <div class="auth-footer">
    <a href="index.html">← Back to home</a>
  </div>

</div>

<script src="api.js"></script>
<script>
  // Already logged in → redirect to dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert alert-error show';
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('login-btn');

    if (!email || !password) return showError('login-error', 'Please fill in all fields.');

    btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
    btn.disabled  = true;

    const result = await AuthAPI.login(email, password);
    if (result.token) {
      localStorage.setItem('token', result.token);
      localStorage.setItem('name',  result.name);
      localStorage.setItem('email', result.email);
      window.location.href = 'dashboard.html';
    } else {
      showError('login-error', result.detail || 'Login failed. Check your email and password.');
      btn.innerHTML = 'Sign In';
      btn.disabled  = false;
    }
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const btn      = document.getElementById('reg-btn');

    if (!name || !email || !password) return showError('reg-error', 'Please fill in all fields.');
    if (password.length < 6) return showError('reg-error', 'Password must be at least 6 characters.');

    btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
    btn.disabled  = true;

    const result = await AuthAPI.register(name, email, password);
    if (result.token) {
      localStorage.setItem('token', result.token);
      localStorage.setItem('name',  result.name);
      localStorage.setItem('email', result.email);
      window.location.href = 'analyzer.html';
    } else {
      showError('reg-error', result.detail || 'Registration failed. Try a different email.');
      btn.innerHTML = 'Create Account';
      btn.disabled  = false;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('tab-login').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  });
</script>
</body>
</html>
